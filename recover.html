
<!-- ==========================================
     recover.html — RECUPERAR CONTRASEÑA
     ========================================== -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña — Rincón de Fe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <a href="index.html" class="link" style="display:inline-block;margin-bottom:20px">← Volver al login</a>

            <div class="title">
                <h1>🔐 Recuperar contraseña</h1>
                <p>Te enviaremos un enlace a tu correo</p>
            </div>

            <div id="messageContainer"></div>

            <div id="step1">
                <form id="recoverForm">
                    <div class="input-group">
                        <label>Correo electrónico</label>
                        <input type="email" id="email" placeholder="tu@email.com" required>
                    </div>
                    <button type="submit" class="btn-primary" id="sendEmailBtn">Enviar enlace de recuperación</button>
                </form>
            </div>

            <div id="step2" style="display:none">
                <form id="newPasswordForm">
                    <div class="input-group">
                        <label>Nueva contraseña</label>
                        <input type="password" id="newPassword" placeholder="Mínimo 6 caracteres" required>
                    </div>
                    <div class="input-group">
                        <label>Confirmar contraseña</label>
                        <input type="password" id="confirmNewPassword" placeholder="Repite tu contraseña" required>
                    </div>
                    <button type="submit" class="btn-primary" id="updatePasswordBtn">Actualizar contraseña</button>
                </form>
            </div>

            <div class="divider"><span>O</span></div>
            <a href="index.html" class="btn-secondary">Volver al login</a>
        </div>
    </div>
    <script src="js/lib/supabase.min.js"></script>
    <script src="js/config/supabase.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/utils/validators.js"></script>
    <script src="js/services/auth.js"></script>
    <script src="js/pages/recover.js"></script>
</body>
</html>
